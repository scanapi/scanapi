site_name: "ScanAPI"
site_description: "ScanAPI documentation generated with MkDocs and mkdocstrings"
site_url: https://scanapi.dev
repo_url: https://github.com/scanapi/scanapi
repo_name: scanapi/scanapi
nav:
  - Home:
    - index.md
    - Changelog: changelog.md
  - User Guide: user-guide/index.md
  - API Documentation:
    - Overview: api.md
    - Modules: api/modules.md
  - Contributor Guide:
      - contributor-guide/index.md
      - First Pull Request: contributor-guide/first-pull-request.md
      - Run ScanAPI in Dev Env:
        - contributor-guide/run-scanapi-dev/index.md
        - On Codespaces: contributor-guide/run-scanapi-dev/codespaces.md
        - Local Manually: contributor-guide/run-scanapi-dev/local-manually.md
        - Local with Dev Container: contributor-guide/run-scanapi-dev/local-dev-container.md
      - Tests Guide: contributor-guide/tests-guide.md
      - Changelog Guide: contributor-guide/changelog-guide.md
      - Dependencies Guide: contributor-guide/dependencies-guide.md
      - Project Maintenance:
        - Deployment Guide: contributor-guide/project-maintenance/deployment-guide.md
      - Sprints:
        - contributor-guide/sprints/index.md
        - EuroPython 2021: contributor-guide/sprints/europython-2021.md
        - PyCon India 2021: contributor-guide/sprints/pycon-india-2021.md
      - Useful Links:
        - Website: https://scanapi.dev
        - Tutorial: https://scanapi.dev/tutorials/step01.html
        - DeepWiki: https://deepwiki.com/scanapi/scanapi
        - PyPI: https://pypi.org/project/scanapi/
        - Docker Hub: https://hub.docker.com/r/camilamaia/scanapi
        - GitHub: https://github.com/scanapi/scanapi
        - Discord: https://scanapi.dev/discord
        - Twitter: https://twitter.com/scanapi_

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          # Ensure the project root is importable so mkdocstrings can import `scanapi`
          setup_commands:
            - "import sys, os; sys.path.insert(0, os.path.abspath('.'))"
          options:
            docstring_style: google
            show_root_toc: true
  - autorefs
theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
    - scheme: slate
      primary: blue
      accent: blue
  features:
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
