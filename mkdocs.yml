        - GitHub: https://github.com/scanapi/scanapi
        - Discord: https://scanapi.dev/discord
        - Twitter: https://twitter.com/scanapi_

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          # Ensure the project root is importable so mkdocstrings can import `scanapi`
          setup_commands:
            - "import sys, os; sys.path.insert(0, os.path.abspath('.'))"
          options:
            docstring_style: google
            extra:
              show_root_toc: true
  - autorefs
theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
    - scheme: slate
      primary: blue
      accent: blue
  features:
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.footer
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
