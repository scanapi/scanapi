site_name: "ScanAPI"
site_description: "ScanAPI documentation generated with MkDocs and mkdocstrings"
site_url: https://scanapi.dev
repo_url: https://github.com/scanapi/scanapi
repo_name: scanapi/scanapi
nav:
  - Home: index.md
  - API:
    - Overview: api.md
    - Modules: api/modules.md
  - Contributor Guide:
      - Introduction: contributor-guide/README.md
      - Contributing: contributor-guide/contributing.md
      - Changelog Guide: contributor-guide/changelog-guide.md
      - Deploy: contributor-guide/deploy.md
      - EuroPython 2021: contributor-guide/europython-2021.md
      - First Pull Request: contributor-guide/first-pull-request.md
      - Managing Dependencies: contributor-guide/managing-dependencies.md
      - Mentored Sprints at PyCon India 2021: contributor-guide/mentored-sprints-at-pycon-india-2021.md
      - Run ScanAPI in Dev Env: contributor-guide/run-scanapi-in-dev-env.md
      - Run ScanAPI Locally Manually: contributor-guide/run-scanapi-locally-manually.md
      - Run ScanAPI Locally with Dev Container: contributor-guide/run-scanapi-locally-with-dev-container.md
      - Run ScanAPI on Codespaces: contributor-guide/run-scanapi-on-codespaces.md
      - Sprints: contributor-guide/sprints.md
      - Writing Tests: contributor-guide/writing-tests.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          # Ensure the project root is importable so mkdocstrings can import `scanapi`
          setup_commands:
            - "import sys, os; sys.path.insert(0, os.path.abspath('.'))"
          options:
            docstring_style: google
            show_root_toc: true
  - autorefs
theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
    - scheme: slate
      primary: blue
      accent: blue
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - attr_list
  - md_in_html
