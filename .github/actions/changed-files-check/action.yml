name: Changed Files Check
description: Detect documentation-only pull request changes for workflow job gating.

outputs:
  docs_only:
    description: Whether every changed file is documentation-related.
    value: ${{ steps.non-docs-filter.outputs.non_docs_changed != 'true' }}

runs:
  using: composite
  steps:
    - name: Detect non-documentation changes
      id: non-docs-filter
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      with:
        predicate-quantifier: every
        filters: |
          non_docs_changed:
            - '**'
            - '!docs/**'
            - '!mkdocs.yml'
            - '!.readthedocs.yaml'
            - '!**/*.md'
