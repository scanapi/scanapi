name: ScanAPI Examples

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run_examples: ${{ steps.changed-files.outputs.run_examples }}
    steps:
      - name: Check changed files
        id: changed-files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_examples=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')"
          non_docs_files="$(printf '%s\n' "$changed_files" | grep -Ev '^(docs/|mkdocs\.yml$|\.readthedocs\.yaml$|\.github/workflows/run-examples\.yml$)' || true)"

          if [ -n "$non_docs_files" ]; then
            echo "run_examples=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_examples=false" >> "$GITHUB_OUTPUT"
          fi

  poke-api:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_examples == 'true'
    steps:
      - name: Checkout ScanAPI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Examples
        uses: ./.github/actions/run_examples
        with:
          api-name: PokeAPI
          command: "uv run scanapi run ./examples/pokeapi/scanapi.yaml -c ./examples/pokeapi/scanapi.conf -o pokeapi.html"
          output-path: pokeapi.html

  httpbingo-api:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_examples == 'true'
    steps:
      - name: Checkout ScanAPI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Examples
        uses: ./.github/actions/run_examples
        with:
          api-name: httpbingo.org
          command: "uv run scanapi run ./examples/httpbingo-api/httpbingo.yaml -c ./examples/httpbingo-api/scanapi.conf -o httpbingo.html"
          output-path: httpbingo.html

  demo-api:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_examples == 'true'
    steps:
      - name: Checkout ScanAPI repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Examples
        env:
          BASE_URL: "https://demo-api.fly.dev/api/v1/"
          USER: "scanapi-workflow"
          PASSWORD: Q*jW@p8pVmHwm2RwQd8ZR8LK
        uses: ./.github/actions/run_examples
        with:
          api-name: Demo API
          command: "uv run scanapi run ./examples/demo-api/scanapi.yaml -c ./examples/demo-api/scanapi.conf -o demo-api.html"
          output-path: demo-api.html
