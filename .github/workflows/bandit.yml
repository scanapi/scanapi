name: Bandit Security Check

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  bandit:
    name: Bandit Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.6.0
        with:
          python-version: '3.13'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security check
        run: bandit -r scanapi -f json -o bandit-report.json || true

      - name: Upload Bandit report as artifact
        if: always()
        uses: actions/upload-artifact@6f51b6d007a0e828c6537deecd46e2038023d706 # v4.6.0
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

      - name: Display Bandit findings
        if: always()
        run: bandit -r scanapi -v
